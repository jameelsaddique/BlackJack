<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="txt-con">
    <h1 id="Heading_el">BlackJack</h1>
    <h2 id="message_el">Want to play a round?</h2>
    
    <div class="dealer">
        <h2>Dealer</h2>
        <div id="dealer-cards" class="cards"></div>
        <div id="dealer-sum"></div>
    </div>
    
    <div class="player">
        <h2>Player</h2>
        <div id="player-cards" class="cards"></div>
        <div id="player-sum"></div>
    </div>
    
    <button onclick="startTheGame()">Start Game</button>
    <button id="new-card-btn" onclick="hit()">Hit</button>
    <button id="stand-btn" onclick="stand()">Stand</button>
    <p id="player-el"></p>
</div>

<footer>&copy; Jameel Ur Rehman. Developed and designed. All rights reserved.</footer>

    <script src="./script.js"></script>
</body>
</html>
